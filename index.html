<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front-end Developer Haneul</title>
    <script src="http://code.jquery.com/jquery-latest.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/e133d6c60e.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 헤더 영역 -->
    <header>
        <!-- 타이틀 버튼-->
        <div class="logo">
            <i class="fas fa-cloud-rain"></i>
            <span><a href="#section1">RYU SKY</a></span>
        </div>
        <!-- 메뉴 버튼 -->
        <div class="menu">
            <ul>
                <li><a href="#section2">PROJECT</a></li>
                <li><a href="#section3">PROFILE</a></li>
                <li><a href="#section4">CONTACT</a></li>
            </ul>
        </div>
    </header>

    <!-- 메인페이지 영역 -->
    <section class="section mainPage" id="section1">
        <div>
            <img src="./me.png" alt="">
        </div>
        <div style="margin-top:200px;">
            <h1>똑똑지니어스 류하늘 포트폴리오 데헷-*</h1>
        </div>
        <div class="text_box" data-trigger>
            <span class="text"></span>
        </div>
    </section>

    <!-- 프로젝트 소개 영역 -->
    <section class="section project" id="section2">
        <h1>장하영 멍텅구리</h1>
    </section>

    <!-- 프로필 영역 -->
    <section class="section aboutMe" id="section3">
        <h1>황조롱이 말미잘</h1>
    </section>

    <!-- 연락처 영역 -->
    <section class="section contact" id="section4">
        <h1>류흑곰 우주최고존엄</h1>
    </section>

    <!-- 푸터 영역 -->
    <footer></footer>

    <script src="js/script.js"></script>
</body>
</html>
