<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front-end Developer Haneul</title>
    <script src="http://code.jquery.com/jquery-latest.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/e133d6c60e.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 헤더 영역 -->
    <header>
        <!-- 타이틀 버튼-->
        <div class="logo">
            <span><a href="#section1">RYU SKY</a></span>
        </div>
        <!-- 메뉴 버튼 -->
        <div class="menu">
            <ul>
                <li><a href="#section2"><div>PROJECT</div></a></li>
                <li><a href="#section3"><div>PROFILE</div></a></li>
                <li><a href="#section4"><div>CONTACT</div></a></li>
                <li onclick="darkMode()"><i class="fas fa-lightbulb"></i></li>
            </ul>
        </div>
    </header>

    <!-- 메인페이지 영역 -->
    <section class="section mainPage" id="section1">
        <!-- 회전하는 메인글 -->
        <div class="welcomeTitle">
            <div class="title front" data-trigger>
                <span class="frontText"></span>
            </div>
            <div class="title back">
                <h4>도전을 두려워하지 않는 개발자 유하늘입니다.</h4>
                
            </div>
        </div>


    </section>

    <!-- 프로젝트 소개 영역 -->
    <section class="section project" id="section2">
        <h1>프로젝트</h1>
    </section>

    <!-- 프로필 영역 -->
    <section class="section aboutMe" id="section3">
        <h1>프로필</h1>
    </section>

    <!-- 연락처 영역 -->
    <section class="section contact" id="section4">
        <h1>연락처</h1>
    </section>

    <!-- 푸터 영역 -->
    <footer></footer>
    <script src="js/script.js"></script>
</body>
</html>
